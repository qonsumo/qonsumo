<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QONSUMO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

color:white;

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:900px;
padding:40px;

}

h1{

}

video{

max-height:70vh;
object-fit:cover;

}

.manifesto{
font-size:1rem;
letter-spacing:2px;
opacity:0.8;

}

.instagram{

.instagram a{

</style>

<body>

<div class="container">

<h1>QONSUMO</h1>

<video autoplay muted loop playsinline>
<source src="Q.MP4" type="video/mp4">
</video>

<p class="manifesto">
A study on materiality, wear and permanence.
</p>

<p class="instagram">
<a href="https://instagram.com/qonsumo">
@qonsumo

</p>
